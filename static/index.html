<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Console - System Control</title>
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			padding: 20px;
		}
		.container {
			background: white;
			padding: 40px;
			border-radius: 16px;
			box-shadow: 0 20px 60px rgba(0,0,0,0.3);
			max-width: 400px;
			width: 100%;
			margin: 0 auto;
		}
		#console-view .container {
			max-width: 800px;
		}
		.hidden { display: none !important; }
		h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 28px; }
		.subtitle { text-align: center; color: #666; margin-bottom: 32px; font-size: 14px; }
		.form-group { margin-bottom: 20px; }
		label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 500; }
		input[type="text"], input[type="password"] {
			width: 100%;
			padding: 14px 16px;
			border: 2px solid #e1e1e1;
			border-radius: 8px;
			font-size: 15px;
			transition: border-color 0.3s ease;
		}
		input:focus { outline: none; border-color: #667eea; }
		.button-group { display: flex; flex-direction: column; gap: 16px; }
		.btn {
			padding: 16px 24px;
			border: none;
			border-radius: 8px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
			display: none;
			align-items: center;
			justify-content: center;
			gap: 10px;
			transition: all 0.3s ease;
		}
		.btn:disabled { opacity: 0.6; cursor: not-allowed; }
		.btn.show-when-down { display: flex !important; }
		.btn.show-when-up { display: flex !important; }
		.btn-login { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
		.btn-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
		.btn-windows { background: linear-gradient(135deg, #0078d4 0%, #00bcf2 100%); color: white; }
		.btn-windows:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,120,212,0.4); }
		.btn-linux { background: linear-gradient(135deg, #f26522 0%, #e95420 100%); color: white; }
		.btn-linux:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(242,101,34,0.4); }
		.btn-shutdown { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); color: white; }
		.btn-shutdown:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(231,76,60,0.4); }
		.btn-logout { background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%); color: white; }
		.btn-logout:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(149,165,166,0.4); }
		.status { margin-top: 24px; padding: 16px; border-radius: 8px; text-align: center; display: none; font-size: 14px; }
		.status.success { background: #d4edda; color: #155724; display: block; }
		.status.error { background: #f8d7da; color: #721c24; display: block; }
		.icon { font-size: 20px; }
		.spinner {
			width: 16px;
			height: 16px;
			border: 2px solid transparent;
			border-top-color: currentColor;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
		}
		@keyframes spin { to { transform: rotate(360deg); } }
		.header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
		.header-title { font-size: 14px; color: #666; font-weight: 500; }
		.btn-logout-small { padding: 8px 16px; font-size: 14px; }
		.metrics-container { margin-top: 24px; padding: 24px; background: #f8f9fa; border-radius: 12px; transition: all 0.3s ease; }
		.metrics-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
		.pc-status { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; }
		.pc-status.up { color: #155724; }
		.pc-status.down { color: #721c24; }
		.booted-os { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: #333; }
		.booted-os .os-dot { width: 10px; height: 10px; border-radius: 50%; background: #0078d4; }
		.status-dot { width: 10px; height: 10px; border-radius: 50%; background: #e74c3c; animation: pulse 2s infinite; }
		.pc-status.up .status-dot { background: #28a745; }
		@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

		.chart-wrapper { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
		.chart-wrapper canvas { width: 100% !important; height: 300px !important; }
	</style>
</head>
<body>
<div class="container">
	<div id="login-view">
		<h1>🔐 Login</h1>
		<p class="subtitle">Enter your credentials</p>
		<div class="form-group">
			<label for="username">Username</label>
			<input type="text" id="username" placeholder="Enter username" autocomplete="username">
		</div>
		<div class="form-group">
			<label for="password">Password</label>
			<input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
		</div>
		<div class="button-group">
			<button class="btn btn-login" onclick="login()">
				<span class="icon">🔑</span>
				<span>Login</span>
				<span class="spinner" style="display:none;"></span>
			</button>
			<div id="login-status" class="status"></div>
		</div>
	</div>

	<div id="console-view" class="hidden">
		<div class="header-actions">
			<span class="header-title" id="username-display"></span>
			<button class="btn btn-logout btn-logout-small" onclick="logout()">
				<span class="icon">🚪</span>
				<span>Logout</span>
			</button>
		</div>
		<h1>🖥️ Console</h1>
		<p class="subtitle">System Control Panel</p>

		<div class="metrics-container">
			<div class="metrics-header">
				<div class="pc-status" id="pc-status">
					<div class="status-dot"></div>
					<span>PC DOWN</span>
				</div>
				<div class="booted-os" id="booted-os">Booted OS: <span>—</span></div>
			</div>
			<div class="chart-wrapper">
				<canvas id="metrics-chart"></canvas>
			</div>
		</div>

		<div class="button-group">
			<button class="btn btn-windows" onclick="bootSystem('windows')">
				<span class="icon">🪟</span>
				<span>Boot Windows</span>
				<span class="spinner" style="display:none;"></span>
			</button>
			<button class="btn btn-linux" onclick="bootSystem('linux')">
				<span class="icon">🐧</span>
				<span>Boot Linux</span>
				<span class="spinner" style="display:none;"></span>
			</button>
			<button class="btn btn-shutdown" onclick="shutdownSystem()">
				<span class="icon">🔌</span>
				<span>Shutdown</span>
				<span class="spinner" style="display:none;"></span>
			</button>
		</div>

		<div id="status" class="status"></div>
	</div>
</div>

<script>
	// --- Auth ---
	function getToken(){ return localStorage.getItem('auth_token'); }
	function setToken(t){ localStorage.setItem('auth_token',t); }
	function removeToken(){ localStorage.removeItem('auth_token'); }
	function showLoginView(){ document.getElementById('login-view').classList.remove('hidden'); document.getElementById('console-view').classList.add('hidden'); }
	function showConsoleView(username){
		document.getElementById('login-view').classList.add('hidden');
		document.getElementById('console-view').classList.remove('hidden');
		document.getElementById('username-display').textContent = '👤 ' + username;
		updateControlButtons(false);
		initCharts();
	}

	async function login(){
		const u=document.getElementById('username'), p=document.getElementById('password'), s=document.getElementById('login-status');
		const btn=document.querySelector('.btn-login'), spinner=btn.querySelector('.spinner'), text=btn.querySelector('span:not(.icon):not(.spinner)');
		const username=u.value.trim(), password=p.value;
		if(!username||!password){ s.textContent='❌ Please enter both username and password'; s.classList.add('error'); s.style.display='block'; return; }
		s.style.display='none'; s.classList.remove('success','error');
		btn.disabled=true; spinner.style.display='inline-block'; text.style.opacity='0.5';
		try{
			const res=await fetch('/auth/login',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password})});
			const r=await res.json();
			if(res.ok && r.token){ setToken(r.token); u.value=''; p.value=''; showConsoleView(username); }
			else{ s.textContent='❌ '+(r.error||'Invalid credentials'); s.classList.add('error'); s.style.display='block'; }
		}catch(err){ s.textContent='❌ Network error: '+err.message; s.classList.add('error'); s.style.display='block'; }
		finally{ btn.disabled=false; spinner.style.display='none'; text.style.opacity='1'; }
	}

	function logout(){ disconnectWebSocket(); removeToken(); showLoginView(); }

	// --- System commands ---
	async function bootSystem(os){ await sendRequest('api/boot',{os_name:os}); }
	async function shutdownSystem(){ await sendRequest('api/shutdown',{}); }

	async function sendRequest(endpoint,data){
		const statusEl=document.getElementById('status');
		const btns=document.querySelectorAll('.button-group .btn:not(.btn-logout)');
		const spinners=document.querySelectorAll('.button-group .spinner');
		const texts=document.querySelectorAll('.button-group > .btn > span:not(.icon):not(.spinner)');
		statusEl.classList.remove('success','error'); statusEl.style.display='none';
		btns.forEach(b=>b.disabled=true); spinners.forEach(s=>s.style.display='inline-block'); texts.forEach(t=>t.style.opacity='0.5');
		const token=getToken();
		const headers={'Content-Type':'application/json'}; if(token) headers['Authorization']='Bearer '+token;
		try{
			const res=await fetch(endpoint,{ method:'POST', headers, body:JSON.stringify(data)});
			if(res.status===401){ logout(); return; }
			const r=await res.json();
			if(r.status){ 
				statusEl.textContent = endpoint==='api/boot' && r.data?.os_name ? `✅ Boot command sent! Selected OS: ${r.data.os_name}` : '✅ Command sent successfully!';
				statusEl.classList.add('success');
			}else{ statusEl.textContent='❌ Error: '+(r.error||'Unknown error'); statusEl.classList.add('error'); }
		}catch(err){ statusEl.textContent='❌ Network error: '+err.message; statusEl.classList.add('error'); }
		finally{ statusEl.style.display='block'; btns.forEach(b=>b.disabled=false); spinners.forEach(s=>s.style.display='none'); texts.forEach(t=>t.style.opacity='1'); }
	}

	async function checkAuth(){
		const token=getToken(); if(!token) return false;
		try{
			const res=await fetch('/auth/verify',{ headers:{'Authorization':'Bearer '+token}});
			if(res.ok){ const r=await res.json(); return r.valid||true; }
		}catch(e){ console.log('Auth check failed:',e); }
		return false;
	}

	async function init(){
		const auth=await checkAuth();
		if(auth){
			const token=getToken();
			try{
				const res=await fetch('/auth/verify',{ headers:{'Authorization':'Bearer '+token}});
				const r=await res.json();
				showConsoleView(r.username);
			}catch(e){ console.log('Failed to fetch user info:',e); }
		}else{ showLoginView(); }
	}

	document.addEventListener('DOMContentLoaded',init);
	document.getElementById('password').addEventListener('keypress', e=>{ if(e.key==='Enter') login(); });
	document.getElementById('username').addEventListener('keypress', e=>{ if(e.key==='Enter') document.getElementById('password').focus(); });

	// --- Charts & WebSocket ---
	let ws=null, wsConnected=false, wsReconnectDelay=1000, wsReconnectTimer=null, maxDataPoints=300, lastMetricsTime=null, METRICS_TIMEOUT_MS=5000, timeoutCheckInterval=null;
	let metricsChart=null;

	function initCharts(){
		const chartOpts={
			responsive:true, maintainAspectRatio:false, animation:false,
			scales: {
				x: {
					type:'time',
					time:{ unit:'second', displayFormats:{ second:'HH:mm:ss' }, tooltipFormat:'HH:mm:ss' },
					ticks:{ autoSkip:true, maxTicksLimit:6 }
				},
				y: { min:0, max:100, beginAtZero:true }
			},
			plugins:{ legend:{ display:true, position:'top' } }
		};

		metricsChart=new Chart(document.getElementById('metrics-chart'),{ type:'line', data:{datasets:[ {label:'CPU Usage (%)', data:[], borderColor:'#0078d4', backgroundColor:'rgba(0,120,212,0.1)', borderWidth:2, fill:true, tension:0.4, pointRadius:0}, {label:'Memory Usage (%)', data:[], borderColor:'#764ba2', backgroundColor:'rgba(118,75,162,0.1)', borderWidth:2, fill:true, tension:0.4, pointRadius:0}, {label:'VRAM Usage (%)', data:[], borderColor:'#00bcf2', backgroundColor:'rgba(0,188,242,0.1)', borderWidth:2, fill:true, tension:0.4, pointRadius:0}]}, options:chartOpts});
		connectWebSocket();
		if(timeoutCheckInterval) clearInterval(timeoutCheckInterval);
		timeoutCheckInterval=setInterval(checkMetricsTimeout,1000);
	}

	function addData(metricType, value){
		const timestamp=new Date();
		const datasetIndex = metricType==='cpu_usage'?0 : metricType==='memory_usage'?1 : 2;
		metricsChart.data.datasets[datasetIndex].data.push({ x: timestamp, y:value });
		if(metricsChart.data.datasets[datasetIndex].data.length>maxDataPoints) metricsChart.data.datasets[datasetIndex].data.shift();
		metricsChart.update('none');
	}

	function resetCharts(){
		if(metricsChart) { metricsChart.data.datasets[0].data=[]; metricsChart.data.datasets[1].data=[]; metricsChart.data.datasets[2].data=[]; metricsChart.update('none'); }
		document.querySelector('#booted-os span').textContent='—';
	}

	function connectWebSocket(){
		const token=getToken();
		if(!token) return;
		const uuid=crypto.randomUUID();
		ws=new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws/'+uuid);
		ws.onopen=()=>{ ws.send(JSON.stringify({token})); wsConnected=true; if(wsReconnectTimer){ clearTimeout(wsReconnectTimer); wsReconnectTimer=null; } };
		ws.onclose=e=>{ wsConnected=false; if(!wsReconnectTimer) wsReconnectTimer=setTimeout(connectWebSocket,wsReconnectDelay); };
		ws.onerror=e=>{ console.log('WebSocket error',e); ws?.close(); };
		ws.onmessage=e=>{
			try{
				const msg=JSON.parse(e.data);
				lastMetricsTime=Date.now();
				updatePCStatus(true);
				if('cpu_usage' in msg) addData('cpu_usage',msg.cpu_usage);
				if('memory_usage' in msg) addData('memory_usage',msg.memory_usage);
				if('vram_usage' in msg) addData('vram_usage',msg.vram_usage);
				if('os' in msg) document.querySelector('#booted-os span').textContent=msg.os;
			}catch(err){ console.error('WS message parse error',err); }
		};
	}

	function disconnectWebSocket(){ if(ws){ ws.close(); ws=null; wsConnected=false; } }

	function updatePCStatus(up){
		const el=document.getElementById('pc-status'); el.classList.remove('up','down');
		el.classList.add(up?'up':'down'); el.querySelector('span').textContent=up?'PC UP':'PC DOWN';
		updateControlButtons(up);
		if(!up) resetCharts();
	}

	function updateControlButtons(pcu){
		const bootBtns=document.querySelectorAll('.btn-windows, .btn-linux');
		const shutdownBtn=document.querySelector('.btn-shutdown');
		bootBtns.forEach(b=>{ if(pcu) b.classList.remove('show-when-down'); else b.classList.add('show-when-down'); });
		if(pcu) shutdownBtn.classList.add('show-when-up'); else shutdownBtn.classList.remove('show-when-up');
	}

	function checkMetricsTimeout(){ if(lastMetricsTime && Date.now()-lastMetricsTime>METRICS_TIMEOUT_MS) updatePCStatus(false); }
</script>
</body>
</html>
