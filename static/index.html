<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Console - System Control</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}

		.container {
			background: white;
			padding: 40px;
			border-radius: 16px;
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
			max-width: 400px;
			width: 100%;
		}

		.hidden {
			display: none !important;
		}

		h1 {
			text-align: center;
			color: #333;
			margin-bottom: 8px;
			font-size: 28px;
		}

		.subtitle {
			text-align: center;
			color: #666;
			margin-bottom: 32px;
			font-size: 14px;
		}

		.form-group {
			margin-bottom: 20px;
		}

		label {
			display: block;
			margin-bottom: 8px;
			color: #555;
			font-size: 14px;
			font-weight: 500;
		}

		input[type="text"],
		input[type="password"] {
			width: 100%;
			padding: 14px 16px;
			border: 2px solid #e1e1e1;
			border-radius: 8px;
			font-size: 15px;
			transition: border-color 0.3s ease;
		}

		input[type="text"]:focus,
		input[type="password"]:focus {
			outline: none;
			border-color: #667eea;
		}

		.button-group {
			display: flex;
			flex-direction: column;
			gap: 16px;
		}

		.btn {
			padding: 16px 24px;
			border: none;
			border-radius: 8px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.3s ease;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 10px;
		}

		.btn:disabled {
			opacity: 0.6;
			cursor: not-allowed;
		}

		.btn-login {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			width: 100%;
		}

		.btn-login:hover:not(:disabled) {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
		}

		.btn-windows {
			background: linear-gradient(135deg, #0078d4 0%, #00bcf2 100%);
			color: white;
		}

		.btn-windows:hover:not(:disabled) {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(0, 120, 212, 0.4);
		}

		.btn-linux {
			background: linear-gradient(135deg, #f26522 0%, #e95420 100%);
			color: white;
		}

		.btn-linux:hover:not(:disabled) {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(242, 101, 34, 0.4);
		}

		.btn-shutdown {
			background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
			color: white;
		}

		.btn-shutdown:hover:not(:disabled) {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(231, 76, 60, 0.4);
		}

		.btn-logout {
			background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
			color: white;
		}

		.btn-logout:hover:not(:disabled) {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(149, 165, 166, 0.4);
		}

		.status {
			margin-top: 24px;
			padding: 16px;
			border-radius: 8px;
			text-align: center;
			display: none;
			font-size: 14px;
		}

		.status.success {
			background: #d4edda;
			color: #155724;
			display: block;
		}

		.status.error {
			background: #f8d7da;
			color: #721c24;
			display: block;
		}

		.icon {
			font-size: 20px;
		}

		.spinner {
			width: 16px;
			height: 16px;
			border: 2px solid transparent;
			border-top-color: currentColor;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
		}

		@keyframes spin {
			to { transform: rotate(360deg); }
		}

		.header-actions {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 24px;
		}

		.header-title {
			font-size: 14px;
			color: #666;
			font-weight: 500;
		}

		.btn-logout-small {
			padding: 8px 16px;
			font-size: 14px;
		}
	</style>
</head>
<body>
	<div class="container">
		<div id="login-view">
			<h1>🔐 Login</h1>
			<p class="subtitle">Enter your credentials</p>
			
			<div class="form-group">
				<label for="username">Username</label>
				<input type="text" id="username" placeholder="Enter username" autocomplete="username">
			</div>
			
			<div class="form-group">
				<label for="password">Password</label>
				<input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
			</div>
			
			<div class="button-group">
				<button class="btn btn-login" onclick="login()">
					<span class="icon">🔑</span>
					<span>Login</span>
					<span class="spinner" style="display: none;"></span>
				</button>
			</div>
			
			<div id="login-status" class="status"></div>
		</div>
	
		<div id="console-view" class="hidden">
			<div class="header-actions">
				<span class="header-title" id="username-display"></span>
				<button class="btn btn-logout btn-logout-small" onclick="logout()">
					<span class="icon">🚪</span>
					<span>Logout</span>
				</button>
			</div>
			
			<h1>🖥️ Console</h1>
			<p class="subtitle">System Control Panel</p>
			
			<div class="button-group">
				<button class="btn btn-windows" onclick="bootSystem('windows')">
					<span class="icon">🪟</span>
					<span>Boot Windows</span>
					<span class="spinner" style="display: none;"></span>
				</button>
				
				<button class="btn btn-linux" onclick="bootSystem('linux')">
					<span class="icon">🐧</span>
					<span>Boot Linux</span>
					<span class="spinner" style="display: none;"></span>
				</button>
				
				<button class="btn btn-shutdown" onclick="shutdownSystem()">
					<span class="icon">🔌</span>
					<span>Shutdown</span>
					<span class="spinner" style="display: none;"></span>
				</button>
			</div>
			
			<div id="status" class="status"></div>
		</div>
	</div>

	<script>
		function getToken() {
			return localStorage.getItem('auth_token');
		}

		function setToken(token) {
			localStorage.setItem('auth_token', token);
		}

		function removeToken() {
			localStorage.removeItem('auth_token');
		}

		function showLoginView() {
			document.getElementById('login-view').classList.remove('hidden');
			document.getElementById('console-view').classList.add('hidden');
		}

		function showConsoleView(username) {
			document.getElementById('login-view').classList.add('hidden');
			document.getElementById('console-view').classList.remove('hidden');
			document.getElementById('username-display').textContent = '👤 ' + username;
		}

		async function login() {
			const usernameInput = document.getElementById('username');
			const passwordInput = document.getElementById('password');
			const statusEl = document.getElementById('login-status');
			const loginButton = document.querySelector('.btn-login');
			const spinner = loginButton.querySelector('.spinner');
			const textSpan = loginButton.querySelector('span:not(.icon):not(.spinner)');

			const username = usernameInput.value.trim();
			const password = passwordInput.value;

			if (!username || !password) {
				statusEl.textContent = '❌ Please enter both username and password';
				statusEl.classList.add('error');
				statusEl.style.display = 'block';
				return;
			}

			statusEl.style.display = 'none';
			statusEl.classList.remove('success', 'error');
			loginButton.disabled = true;
			spinner.style.display = 'inline-block';
			textSpan.style.opacity = '0.5';

			try {
				const response = await fetch('/auth/login', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify({ username, password }),
				});

				const result = await response.json();

				if (response.ok && result.token) {
					setToken(result.token);
					usernameInput.value = '';
					passwordInput.value = '';
					showConsoleView(username);
				} else {
					statusEl.textContent = '❌ ' + (result.error || 'Invalid credentials');
					statusEl.classList.add('error');
					statusEl.style.display = 'block';
				}
			} catch (error) {
				statusEl.textContent = '❌ Network error: ' + error.message;
				statusEl.classList.add('error');
				statusEl.style.display = 'block';
			} finally {
				loginButton.disabled = false;
				spinner.style.display = 'none';
				textSpan.style.opacity = '1';
			}
		}

		function logout() {
			removeToken();
			showLoginView();
		}

		async function bootSystem(osName) {
			await sendRequest('api/boot', { os_name: osName });
		}

		async function shutdownSystem() {
			await sendRequest('api/shutdown', {});
		}

		async function sendRequest(endpoint, data) {
			const statusEl = document.getElementById('status');
			const allButtons = document.querySelectorAll('.button-group .btn:not(.btn-logout)');
			const allSpinners = document.querySelectorAll('.button-group .spinner');
			const textSpans = document.querySelectorAll('.button-group > .btn > span:not(.icon):not(.spinner)');
			
			statusEl.classList.remove('success', 'error');
			statusEl.style.display = 'none';
			
			allButtons.forEach(btn => btn.disabled = true);
			allSpinners.forEach(s => s.style.display = 'inline-block');
			textSpans.forEach(t => t.style.opacity = '0.5');
			
			const token = getToken();
			
			const headers = {
				'Content-Type': 'application/json',
			};

			if (token) {
				headers['Authorization'] = 'Bearer ' + token;
			}

			try {
				const response = await fetch(endpoint, {
					method: 'POST',
					headers: headers,
					body: JSON.stringify(data),
				});

				if (response.status === 401) {
					logout();
					return;
				}

				const result = await response.json();
				
				if (result.status) {
					statusEl.textContent = '✅ Command sent successfully!';
					statusEl.classList.add('success');
				} else {
					statusEl.textContent = '❌ Error: ' + (result.error || 'Unknown error');
					statusEl.classList.add('error');
				}
			} catch (error) {
				statusEl.textContent = '❌ Network error: ' + error.message;
				statusEl.classList.add('error');
			} finally {
				statusEl.style.display = 'block';
				allButtons.forEach(btn => btn.disabled = false);
				allSpinners.forEach(s => s.style.display = 'none');
				textSpans.forEach(t => t.style.opacity = '1');
			}
		}

		async function checkAuth() {
			const token = getToken();
			
			if (!token) {
				return false;
			}

			try {
				const response = await fetch('/auth/verify', {
					headers: {
						'Authorization': 'Bearer ' + token,
					},
				});

				if (response.ok) {
					const result = await response.json();
					return result.valid || true;
				}
			} catch (error) {
				console.log('Auth check failed:', error);
			}

			return false;
		}

		async function init() {
			const isAuthenticated = await checkAuth();
			
			if (isAuthenticated) {
				const token = getToken();
				try {
					const response = await fetch('/auth/verify', {
						headers: {
							'Authorization': 'Bearer ' + token,
						},
					});
					const result = await response.json();
					showConsoleView(result.username);
				} catch (error) {
					console.log('Failed to fetch user info:', error);
				}
			} else {
				showLoginView();
			}
		}

		document.addEventListener('DOMContentLoaded', init);

		document.getElementById('password').addEventListener('keypress', function(e) {
			if (e.key === 'Enter') {
				login();
			}
		});

		document.getElementById('username').addEventListener('keypress', function(e) {
			if (e.key === 'Enter') {
				document.getElementById('password').focus();
			}
		});
	</script>
</body>
</html>
